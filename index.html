<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="contents">
        <div class="navbar">
            <input id="input" type="text" placeholder="Enter city name">
            <img id="searchimg" src="images/search.png">
        </div>

        <div class="images">
            <img id="dispimage" src="images/clouds.png">
        </div>

        <div class="temp">
            <p id="temperature">1° C</p>
            <p id="city">Delhi</p>
        </div>

        <div class="addinfo">
            <img src="images/humidity.png">
            <div class="humi">
            <p id="value">90%</p>
            <p id="humidity">Humidity</p>
            </div>
            <div class="windyy">
            <img src="images/wind.png">
            <p id="speed">2.68 km/h</p>
            <p id="wind">Windspeed</p>
        </div>
        </div>
    </div>
</div>
    <script src="script.js"></script>
</body>
</html>
